<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/whistle.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CourtSide — הפנקס הדיגיטלי של מאמן הכדורסל. ספריית תרגילים, בונה אימונים, לוח טקטיקה, לו״ז חכם וקהילת מאמנים — הכול בעברית, במקום אחד." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F6F9FC" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141E36" />

    <!-- Open Graph — תצוגה יפה בשיתוף בוואטסאפ/פייסבוק -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CourtSide — הפנקס הדיגיטלי של מאמן הכדורסל" />
    <meta property="og:description" content="תרגילים, תוכניות אימון, לוח טקטיקה ולו״ז — פלטפורמה מקצועית למאמני כדורסל, בעברית." />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:url" content="https://courtsideil.netlify.app/" />
    <meta property="og:image" content="https://courtsideil.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- גופנים: preconnect + link (לא חוסם רינדור כמו @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Heebo:wght@700;800;900&display=swap"
      rel="stylesheet"
    />

    <title>CourtSide — הפנקס הדיגיטלי של מאמן הכדורסל</title>

    <!-- JSON-LD — נתונים מובנים לגוגל (schema.org SoftwareApplication) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CourtSide",
      "description": "הפנקס הדיגיטלי של מאמן הכדורסל — ספריית תרגילים, בונה אימונים, לוח טקטיקה, לו״ז חכם וקהילת מאמנים, בעברית.",
      "url": "https://courtsideil.netlify.app/",
      "applicationCategory": "SportsApplication",
      "operatingSystem": "Web",
      "inLanguage": "he",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "ILS" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
