# הגדרות פריסה ל-Netlify

[build]
  command = "npm run build"
  publish = "dist"

# מבטיח שכל הכתובות יובילו לאפליקציה (חשוב לאתר עם דפים)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ===== כותרות אבטחה — מוחלות על כל הדפים =====
[[headers]]
  for = "/*"
  [headers.values]
    # מונע הטמעת האתר ב-iframe באתרים זרים (clickjacking)
    X-Frame-Options = "DENY"
    # מונע מהדפדפן "לנחש" סוגי קבצים (MIME sniffing)
    X-Content-Type-Options = "nosniff"
    # לא מדליף כתובות מלאות לאתרים חיצוניים
    Referrer-Policy = "strict-origin-when-cross-origin"
    # חוסם גישה לחיישנים/מצלמה/מיקרופון שהאתר לא צריך
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # HTTPS בלבד, כולל תתי-דומיינים, לשנה
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content-Security-Policy — מגביל מאיפה מותר לטעון קוד ותוכן
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.googleapis.com https://api.rss2json.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

# ===== קאשינג לנכסים סטטיים — טעינות חוזרות מהירות =====
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
